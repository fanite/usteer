name: Build official usteer IPK

on:
  workflow_dispatch: # 手动触发

env:
  SDK_DIR: sdk

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # 定义目标架构和对应的 SDK 下载路径
        # 你可以根据需要增减或修改这里的架构
        target:
          - { arch: "mipsel_24kc", sdk_path: "ramips/mt7621" } # 常用于 MT7621 设备
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK
        run: |
          # 下载对应架构的 SDK。此处使用 OpenWrt 24.10.0 版本
          SDK_URL="https://archive.openwrt.org/releases/24.10.6/targets/ramips/mt7621/openwrt-sdk-24.10.6-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          wget -q "$SDK_URL" -O sdk.tar.zst
          tar -axf sdk.tar.zst
          SDK_DIR=$(tar -tf sdk.tar.zst | head -1 | cut -f1 -d"/")
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK extracted to: $SDK_DIR"

      - name: Configure feeds and install official usteer
        run: |
          cd ${{ env.SDK_DIR }}
          # 添加官方 usteer 的源码源（从 git.openwrt.org 拉取）
          # 注意：usteer 在 OpenWrt 的 packages feed 中，通常无需额外添加。
          # 但如果需要直接从仓库拉取最新源码，可以取消下面一行的注释：
          # echo 'src-git usteer https://git.openwrt.org/feed/packages.git' >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install usteer

      - name: Compile usteer IPK
        run: |
          cd ${{ env.SDK_DIR }}
          # 编译 usteer 包
          make -j$(nproc) V=s package/usteer/compile

      - name: Upload IPK and logs as artifacts
        if: always() # 无论编译成功与否，都上传产物和日志
        uses: actions/upload-artifact@v4
        with:
          name: usteer-official-ipk-${{ matrix.target.arch }}
          path: |
            ${{ env.SDK_DIR }}/bin/packages/**/*.ipk
            ${{ env.SDK_DIR }}/logs/**/*.txt
